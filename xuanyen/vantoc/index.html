		function sendView() {
			var title = document.title;
			if (!title || title.toLowerCase().includes("not found") || title === "index") {
				setTimeout(sendView, 2000); return;
			}
	
		// 1. Chuyển thành chữ thường và bỏ dấu tiếng Việt
			var lessonId = title.toLowerCase()
								.normalize("NFD")
								.replace(/[\u0300-\u036f]/g, "");

		// 2. Xử lý các ký tự đặc biệt theo ý anh:
		// - Xóa dấu + và dấu ; (để 30+20 thành 3020)
		// - Thay khoảng trắng và các ký tự khác thành dấu gạch ngang (-)
		// - Loại bỏ dấu gạch ngang dư thừa
			lessonId = lessonId.replace(/[+;]/g, "")           // Xóa hẳn dấu + và ;
							   .replace(/[^a-z0-9]/g, "-")     // Mọi ký tự lạ khác biến thành -
                               .replace(/-+/g, "-")            // Gộp nhiều dấu -- thành một dấu -
                               .replace(/^-+|-+$/g, "");       // Cắt dấu - ở đầu và cuối dòng

			firebase.database().ref("counts/" + lessonId).update({
				views: firebase.database.ServerValue.increment(1),
				lastTime: new Date().toLocaleDateString('vi-VN') + " " + new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
			});
